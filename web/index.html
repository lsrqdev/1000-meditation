<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A 1000-day progressive meditation app.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="1000">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>1000</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    window.meditationAudio = (() => {
      const bell = new Audio('assets/assets/audio/bell.mp3');
      bell.preload = 'auto';
      bell.playsInline = true;
      bell.volume = 0.7;

      async function unlock() {
        try {
          bell.pause();
          bell.currentTime = 0;
          bell.volume = 0.001;
          await bell.play();
          bell.pause();
          bell.currentTime = 0;
          bell.volume = 0.7;
          return true;
        } catch (error) {
          console.warn('Unable to unlock completion audio', error);
          bell.volume = 0.7;
          return false;
        }
      }

      function playBell() {
        try {
          bell.pause();
          bell.currentTime = 0;
          bell.volume = 0.7;
          const playback = bell.play();
          if (playback && typeof playback.catch === 'function') {
            playback.catch((error) => {
              console.warn('Unable to play completion audio', error);
            });
          }
          return true;
        } catch (error) {
          console.warn('Unable to play completion audio', error);
          return false;
        }
      }

      return { unlock, playBell };
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
