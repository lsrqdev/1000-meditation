<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A 1000-day progressive meditation app.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="1000">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>1000</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    window.meditationAudio = (() => {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      let audioContext = null;
      let keepAliveOscillator = null;
      let keepAliveGain = null;
      let wakeLock = null;
      let wantsWakeLock = false;
      const bell = new Audio('assets/assets/audio/bell.mp3');
      bell.preload = 'auto';
      bell.playsInline = true;
      bell.volume = 0.7;

      let unlocked = false;

      function getAudioContext() {
        if (!AudioContext) return null;
        if (!audioContext) {
          audioContext = new AudioContext();
        }
        return audioContext;
      }

      async function unlockContext() {
        const context = getAudioContext();
        if (!context) return false;
        if (context.state !== 'running') {
          await context.resume();
        }

        const buffer = context.createBuffer(1, 1, context.sampleRate);
        const source = context.createBufferSource();
        source.buffer = buffer;
        source.connect(context.destination);
        source.start(0);
        unlocked = true;
        return true;
      }

      function startSessionAudio() {
        const context = getAudioContext();
        if (!context || keepAliveOscillator) return false;
        if (context.state !== 'running') return false;

        requestWakeLock();
        keepAliveOscillator = context.createOscillator();
        keepAliveGain = context.createGain();
        keepAliveOscillator.type = 'sine';
        keepAliveOscillator.frequency.setValueAtTime(18, context.currentTime);
        keepAliveGain.gain.setValueAtTime(0.00001, context.currentTime);
        keepAliveOscillator.connect(keepAliveGain);
        keepAliveGain.connect(context.destination);
        keepAliveOscillator.start();
        return true;
      }

      function stopSessionAudio() {
        try {
          if (keepAliveOscillator) {
            keepAliveOscillator.stop();
            keepAliveOscillator.disconnect();
          }
          if (keepAliveGain) {
            keepAliveGain.disconnect();
          }
        } catch (error) {
          console.warn('Unable to stop session audio keepalive', error);
        } finally {
          keepAliveOscillator = null;
          keepAliveGain = null;
        }
      }

      function playWebAudioBell() {
        const context = getAudioContext();
        if (!context || context.state !== 'running') return false;

        const now = context.currentTime;
        const master = context.createGain();
        master.gain.setValueAtTime(0.0001, now);
        master.gain.exponentialRampToValueAtTime(0.22, now + 0.02);
        master.gain.exponentialRampToValueAtTime(0.0001, now + 1.25);
        master.connect(context.destination);

        [
          [660, 0],
          [990, 0.08],
          [1320, 0.16],
        ].forEach(([frequency, offset]) => {
          const oscillator = context.createOscillator();
          const gain = context.createGain();
          oscillator.type = 'sine';
          oscillator.frequency.setValueAtTime(frequency, now + offset);
          gain.gain.setValueAtTime(0.0001, now + offset);
          gain.gain.exponentialRampToValueAtTime(0.45, now + offset + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + offset + 0.85);
          oscillator.connect(gain);
          gain.connect(master);
          oscillator.start(now + offset);
          oscillator.stop(now + offset + 0.9);
        });

        window.setTimeout(stopSessionAudio, 1600);
        window.setTimeout(releaseWakeLock, 1600);
        return true;
      }

      async function requestWakeLock() {
        wantsWakeLock = true;
        if (!('wakeLock' in navigator)) return false;

        try {
          if (!wakeLock) {
            wakeLock = await navigator.wakeLock.request('screen');
            wakeLock.addEventListener('release', () => {
              wakeLock = null;
              if (wantsWakeLock && document.visibilityState === 'visible') {
                requestWakeLock();
              }
            });
          }
          return true;
        } catch (error) {
          console.warn('Unable to request wake lock', error);
          return false;
        }
      }

      function releaseWakeLock() {
        wantsWakeLock = false;
        if (wakeLock) {
          wakeLock.release().catch((error) => {
            console.warn('Unable to release wake lock', error);
          });
          wakeLock = null;
        }
        return true;
      }

      async function unlock() {
        let didUnlock = false;

        try {
          didUnlock = await unlockContext();
        } catch (error) {
          console.warn('Unable to unlock Web Audio', error);
        }

        try {
          bell.muted = true;
          bell.pause();
          bell.currentTime = 0;
          await bell.play();
          bell.pause();
          bell.currentTime = 0;
          bell.muted = false;
          bell.volume = 0.7;
          didUnlock = true;
        } catch (error) {
          console.warn('Unable to unlock completion audio', error);
          bell.muted = false;
          bell.volume = 0.7;
        }

        unlocked = unlocked || didUnlock;
        return unlocked;
      }

      function playBell() {
        if (playWebAudioBell()) return true;

        try {
          bell.pause();
          bell.currentTime = 0;
          bell.volume = 0.7;
          const playback = bell.play();
          if (playback && typeof playback.catch === 'function') {
            playback.catch((error) => {
              console.warn('Unable to play completion audio', error);
            });
          }
          return true;
        } catch (error) {
          console.warn('Unable to play completion audio', error);
          return false;
        }
      }

      ['pointerdown', 'touchstart', 'click'].forEach((eventName) => {
        window.addEventListener(
          eventName,
          () => {
            if (!unlocked) unlock();
          },
          { capture: true, once: false, passive: true }
        );
      });

      document.addEventListener('visibilitychange', () => {
        if (wantsWakeLock && document.visibilityState === 'visible') {
          requestWakeLock();
        }
      });

      return {
        unlock,
        startSessionAudio,
        stopSessionAudio,
        requestWakeLock,
        releaseWakeLock,
        playBell
      };
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
