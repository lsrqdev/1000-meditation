<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A 1000-day progressive meditation app.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="1000">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>1000</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    window.meditationAudio = (() => {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      const audioContext = AudioContext ? new AudioContext() : null;
      const bell = new Audio('assets/assets/audio/bell.mp3');
      bell.preload = 'auto';
      bell.playsInline = true;
      bell.volume = 0.7;

      let unlocked = false;

      async function unlockContext() {
        if (!audioContext) return false;
        if (audioContext.state !== 'running') {
          await audioContext.resume();
        }

        const buffer = audioContext.createBuffer(1, 1, audioContext.sampleRate);
        const source = audioContext.createBufferSource();
        source.buffer = buffer;
        source.connect(audioContext.destination);
        source.start(0);
        unlocked = true;
        return true;
      }

      function playWebAudioBell() {
        if (!audioContext || audioContext.state !== 'running') return false;

        const now = audioContext.currentTime;
        const master = audioContext.createGain();
        master.gain.setValueAtTime(0.0001, now);
        master.gain.exponentialRampToValueAtTime(0.22, now + 0.02);
        master.gain.exponentialRampToValueAtTime(0.0001, now + 1.25);
        master.connect(audioContext.destination);

        [
          [660, 0],
          [990, 0.08],
          [1320, 0.16],
        ].forEach(([frequency, offset]) => {
          const oscillator = audioContext.createOscillator();
          const gain = audioContext.createGain();
          oscillator.type = 'sine';
          oscillator.frequency.setValueAtTime(frequency, now + offset);
          gain.gain.setValueAtTime(0.0001, now + offset);
          gain.gain.exponentialRampToValueAtTime(0.45, now + offset + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + offset + 0.85);
          oscillator.connect(gain);
          gain.connect(master);
          oscillator.start(now + offset);
          oscillator.stop(now + offset + 0.9);
        });

        return true;
      }

      async function unlock() {
        let didUnlock = false;

        try {
          didUnlock = await unlockContext();
        } catch (error) {
          console.warn('Unable to unlock Web Audio', error);
        }

        try {
          bell.muted = true;
          bell.pause();
          bell.currentTime = 0;
          await bell.play();
          bell.pause();
          bell.currentTime = 0;
          bell.muted = false;
          bell.volume = 0.7;
          didUnlock = true;
        } catch (error) {
          console.warn('Unable to unlock completion audio', error);
          bell.muted = false;
          bell.volume = 0.7;
        }

        unlocked = unlocked || didUnlock;
        return unlocked;
      }

      function playBell() {
        if (playWebAudioBell()) return true;

        try {
          bell.pause();
          bell.currentTime = 0;
          bell.volume = 0.7;
          const playback = bell.play();
          if (playback && typeof playback.catch === 'function') {
            playback.catch((error) => {
              console.warn('Unable to play completion audio', error);
            });
          }
          return true;
        } catch (error) {
          console.warn('Unable to play completion audio', error);
          return false;
        }
      }

      ['pointerdown', 'touchstart', 'click'].forEach((eventName) => {
        window.addEventListener(
          eventName,
          () => {
            if (!unlocked) unlock();
          },
          { capture: true, once: false, passive: true }
        );
      });

      return { unlock, playBell };
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
